<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HotBoard - 世界热点聚合</title>
    <meta name="description" content="聚合全球热门社交媒体、新闻平台和技术社区的热点内容">
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔥</text></svg>">
</head>
<body>
    <header class="header">
        <div class="container">
            <div class="logo">
                <span class="logo-icon">🔥</span>
                <h1>HotBoard</h1>
            </div>
            <p class="tagline">世界热点，一页尽览</p>
            <div class="header-meta">
                <span id="last-updated">加载中...</span>
                <span class="divider">|</span>
                <span id="item-count">0</span> 条热点
            </div>
        </div>
    </header>

    <main class="main">
        <div class="container">
            <div class="filters">
                <div class="filter-group">
                    <label>来源:</label>
                    <select id="source-filter">
                        <option value="all">全部</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label>分类:</label>
                    <select id="category-filter">
                        <option value="all">全部</option>
                        <option value="tech">技术</option>
                        <option value="social">社交</option>
                        <option value="news">新闻</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label>排序:</label>
                    <select id="sort-filter">
                        <option value="score">热度</option>
                        <option value="time">时间</option>
                    </select>
                </div>
                <button id="refresh-btn" class="refresh-btn">🔄 刷新</button>
            </div>

            <div id="loading" class="loading">
                <div class="spinner"></div>
                <p>正在加载热点数据...</p>
            </div>

            <div id="error" class="error hidden">
                <p>加载失败，请稍后重试</p>
            </div>

            <div id="hot-list" class="hot-list"></div>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <p>数据来源: Hacker News, GitHub Trending, Reddit, Weibo, RSS</p>
            <p>由 <a href="https://github.com/yourusername/hotboard" target="_blank">HotBoard</a> 自动抓取更新</p>
        </div>
    </footer>

    <script src="app.js"></script>
</body>
</html>
