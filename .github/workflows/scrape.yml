name: Scrape Hot Topics

on:
  schedule:
    - cron: '0 0,6,12,18 * * *'
  workflow_dispatch:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run scraper
        run: |
          export PYTHONPATH=$PYTHONPATH:$(pwd)
          python src/main.py -o data/hotboard.json -m 100
        env:
          LOG_LEVEL: INFO
      
      - name: Verify output
        run: |
          if [ ! -f data/hotboard.json ]; then
            echo "Error: hotboard.json not created"
            exit 1
          fi
          echo "Items count: $(jq '.items | length' data/hotboard.json)"
          echo "Sources: $(jq '.sources' data/hotboard.json)"

      - name: Commit and push
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update hotboard data"
          file_pattern: "data/hotboard.json"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
