name: Scrape Hot Topics

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          persist-credentials: false
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run scraper
        run: |
          export PYTHONPATH=$PYTHONPATH:$(pwd)
          python src/main.py -o data/hotboard.json -m 100
        env:
          LOG_LEVEL: INFO
      
      - name: Update file via GitHub API
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const filePath = path.join(process.cwd(), 'data', 'hotboard.json');
            const content = fs.readFileSync(filePath, 'utf8');
            const base64Content = Buffer.from(content).toString('base64');
            
            try {
              await github.rest.repos.createOrUpdateFileContents({
                owner: context.repo.owner,
                repo: context.repo.repo,
                path: 'data/hotboard.json',
                message: 'Update hotboard data',
                content: base64Content,
                branch: 'main'
              });
              console.log('File updated successfully');
            } catch (error) {
              console.log('Error:', error.message);
            }
      
      - name: Trigger Pages rebuild
        uses: actions/github-script@v7
        with:
          script: |
            // Create a dummy commit to trigger Pages
            await github.rest.repos.createOrUpdateFileContents({
              owner: context.repo.owner,
              repo: context.repo.repo,
              path: '.nojekyll',
              message: 'Trigger Pages rebuild',
              content: Buffer.from('').toString('base64'),
              branch: 'main'
            });
