name: Scrape Hot Topics

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          persist-credentials: false
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run scraper
        run: |
          export PYTHONPATH=$PYTHONPATH:$(pwd)
          python src/main.py -o data/hotboard.json -m 100
        env:
          LOG_LEVEL: INFO
      
      - name: Update files via GitHub API
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const github = context.github;
            const { owner, repo } = context.repo;
            
            async function updateFile(filePath, message) {
              const fileContent = fs.readFileSync(path.join(process.cwd(), filePath), 'utf8');
              const base64Content = Buffer.from(fileContent).toString('base64');
              
              // Get current file SHA
              try {
                const { data: fileData } = await github.rest.repos.getContent({
                  owner,
                  repo,
                  path: filePath,
                  ref: 'main'
                });
                
                await github.rest.repos.createOrUpdateFileContents({
                  owner,
                  repo,
                  path: filePath,
                  message: message,
                  content: base64Content,
                  sha: fileData.sha,
                  branch: 'main'
                });
                console.log(`Updated ${filePath}`);
              } catch (e) {
                console.log(`Error updating ${filePath}: ${e.message}`);
              }
            }
            
            await updateFile('data/hotboard.json', 'Update hotboard data');
            await updateFile('.nojekyll', 'Trigger Pages rebuild');
