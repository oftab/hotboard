<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HotBoard - 世界热点聚合</title>
    <meta name="description" content="聚合全球热门社交媒体、新闻平台和技术社区的热点内容">
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔥</text></svg>">
</head>
<body>
    <header class="header">
        <div class="container">
            <div class="header-content">
                <div class="logo">
                    <span class="logo-icon">🔥</span>
                    <h1>HotBoard</h1>
                </div>
                <div class="header-stats">
                    <div class="stat-item">
                        <span class="stat-value" id="item-count">0</span>
                        <span class="stat-label">热点</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-value" id="platform-count">0</span>
                        <span class="stat-label">平台</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-value" id="last-updated">--</span>
                        <span class="stat-label">更新</span>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <nav class="nav-bar">
        <div class="container">
            <div class="nav-content">
                <div class="nav-filters">
                    <select id="date-filter" class="nav-select">
                        <option value="today">今天</option>
                    </select>
                    <select id="category-filter" class="nav-select">
                        <option value="all">全部分类</option>
                        <option value="tech">技术</option>
                        <option value="social">社交</option>
                        <option value="news">新闻</option>
                        <option value="entertainment">娱乐</option>
                        <option value="finance">财经</option>
                        <option value="health">健康</option>
                    </select>
                </div>
                <button id="refresh-btn" class="refresh-btn">🔄 刷新</button>
            </div>
        </div>
    </nav>

    <main class="main">
        <div class="container">
            <div id="loading" class="loading">
                <div class="spinner"></div>
                <p>正在加载热点数据...</p>
            </div>

            <div id="error" class="error hidden">
                <p>加载失败，请稍后重试</p>
            </div>

            <div id="platform-container" class="platform-grid"></div>
        </div>
    </main>

    <div id="detail-modal" class="modal">
        <div class="modal-content">
            <div id="detail-content"></div>
        </div>
    </div>

    <footer class="footer">
        <div class="container">
            <p>支持 42 个平台 · 每15分钟自动更新</p>
            <p><a href="https://github.com/oftab/hotboard" target="_blank">GitHub</a></p>
        </div>
    </footer>

    <script src="app.js"></script>
</body>
</html>
